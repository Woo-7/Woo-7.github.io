<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoDev | Growth & AI Blog</title>
    <script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0;
            /* 默认为暗色主题 */
            background: black;
            color: #ccc;
            font-family: 'JetBrains Mono', 'Arial', monospace;
            /* 过渡效果适用于暗色到暗色，亮色到亮色的变化 */
            transition: background 0.5s, color 0.5s;
        }

        /* ===== SYSTEM THEME ADAPTATION ===== */
        /* 当系统处于浅色模式时 */
        @media (prefers-color-scheme: light) {
            body {
                background: #fff;
                color: #111;
            }

            /* 浅色模式下的卡片样式 */
            .card {
                background: #f5f5f5;
                color: #111;
            }

            /* 浅色模式下导航栏的半透明背景 */
            nav {
                background: rgba(255, 255, 255, 0.8);
            }
        }

        /* 当系统处于深色模式时（可选，显式声明以增强一致性） */
        @media (prefers-color-scheme: dark) {
            body {
                background: black;
                color: #ccc;
            }

            .card {
                background: #0a192f;
                color: #ccc;
            }

             /* 深色模式下导航栏的半透明背景 */
            nav {
                background: rgba(0, 0, 0, 0.8);
            }
        }


        /* ===== NAV ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center; /* Center items vertically */
            gap: 30px;
            padding: 15px;
            /* 注意：背景色由 media query 控制 */
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        nav a {
            /* 文字颜色也由 body 的 color 属性继承或直接在 media query 中覆盖 */
            color: inherit; 
            text-decoration: none;
            position: relative;
            padding-bottom: 2px; /* For the hover effect */
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #d4af37;
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* ===== SECTION ===== */
        section {
            padding: 100px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* ===== CARD ===== */
        .card {
            /* 背景色和文字色由 media query 控制 */
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(212, 175, 55, 0.2);
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            gap: 20px;
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        /* ===== TAG ===== */
        .tag {
            padding: 5px 10px;
            border: 1px solid #555;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block; /* Ensure it behaves like an inline element */
        }

        /* ===== PARTICLES ===== */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* ===== Animations ===== */

        .hero-typing {
            overflow: hidden;
            border-right: .15em solid #d4af37;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #d4af37; }
        }

        .slide-in {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .slide-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .glow-text {
            text-shadow: 0 0 10px #d4af37, 0 0 20px #d4af37, 0 0 30px #d4af37;
        }

        .neon-border {
            position: relative;
            border: 2px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        linear-gradient(45deg, #00ff9d, #ff2a6d, #d4af37) border-box;
            animation: border-flow 3s linear infinite;
        }

        @keyframes border-flow {
            0% { background: linear-gradient(#000, #000) padding-box,
                            linear-gradient(45deg, #00ff9d, #ff2a6d, #d4af37) border-box; }
            33% { background: linear-gradient(#000, #000) padding-box,
                            linear-gradient(45deg, #ff2a6d, #d4af37, #00ff9d) border-box; }
            66% { background: linear-gradient(#000, #000) padding-box,
                            linear-gradient(45deg, #d4af37, #00ff9d, #ff2a6d) border-box; }
            100% { background: linear-gradient(#000, #000) padding-box,
                            linear-gradient(45deg, #00ff9d, #ff2a6d, #d4af37) border-box; }
        }

        .code-terminal {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(10, 25, 47, 0.8);
            border-left: 4px solid #00ff9d;
            padding: 1.5rem;
            border-radius: 0 0.5rem 0.5rem 0;
            position: relative;
            margin: 1rem 0;
        }

        .code-terminal::before {
            content: '$';
            position: absolute;
            left: -1.5rem;
            top: 1.5rem;
            color: #00ff9d;
            font-weight: bold;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0a192f; /* 暗色主题背景 */
        }

        /* 滚动条样式也需要根据主题变化 */
        @media (prefers-color-scheme: light) {
            ::-webkit-scrollbar-track {
                background: #e0e0e0; /* 浅色主题背景 */
            }
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#d4af37, #f9d423);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(#00ff9d, #ff2a6d);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                padding: 10px;
            }
            nav a {
                font-size: 0.9em;
            }
            section {
                padding: 80px 15px;
            }
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<!-- NAV -->
<nav>
    <a href="#hero">Home</a>
    <a href="#about">About</a>
    <a href="#blog">Blog</a>
    <a href="#projects">Projects</a>
    <!-- 移除了手动主题切换按钮，因为它不再需要 -->
    <!-- <button id="theme-toggle">
        <i class="fas fa-moon"></i>
    </button> -->
</nav>

<!-- HERO -->
<section id="hero" class="hero">
    <h1 class="hero-typing glow-text">Simon Wu</h1>
    <p>Growth × Data × AI</p>
    <p>Building systems, not just results.</p>
</section>

<!-- ABOUT -->
<section id="about" class="slide-in">
    <h2>About</h2>
    <div class="grid grid-3">
        <div class="card">
            <h3>Growth</h3>
            <p>电商增长策略 & ROAS优化</p>
        </div>
        <div class="card">
            <h3>Data</h3>
            <p>数据驱动决策模型</p>
        </div>
        <div class="card">
            <h3>AI</h3>
            <p>自动化系统 & AI应用</p>
        </div>
    </div>
</section>

<!-- BLOG -->
<section id="blog" class="slide-in">
    <h2>Latest Insights</h2>

    <div style="text-align:center;margin-bottom:30px;">
        <span class="tag">Growth</span>
        <span class="tag">Data</span>
        <span class="tag">AI</span>
        <span class="tag">System</span>
    </div>

    <div id="blog-list" class="grid grid-3"></div>
</section>

<!-- PROJECT -->
<section id="projects" class="slide-in">
    <h2>Projects</h2>

    <div class="grid grid-3">
        <div class="card">
            <h3>Ad Optimization</h3>
            <p>广告投放优化系统</p>
        </div>
        <div class="card">
            <h3>Product Tier</h3>
            <p>产品分级模型</p>
        </div>
        <div class="card">
            <h3>AI Engine</h3>
            <p>AI自动化内容系统</p>
        </div>
    </div>
</section>

<script>
// ===== 粒子背景 =====
particlesJS("particles-js", {
    particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: ["#d4af37", "#00ff9d", "#ff2a6d"] },
        shape: { type: "circle" },
        opacity: { value: 0.5, random: true },
        size: { value: 3, random: true },
        line_linked: {
            enable: true,
            distance: 150,
            color: "#d4af37",
            opacity: 0.2,
            width: 1
        },
        move: {
            enable: true,
            speed: 2,
            direction: "none",
            random: true,
            straight: false,
            out_mode: "out",
            bounce: false,
            attract: { enable: true, rotateX: 600, rotateY: 1200 }
        }
    },
    interactivity: {
        detect_on: "canvas",
        events: {
            onhover: { enable: true, mode: "repulse" },
            onclick: { enable: true, mode: "push" },
            resize: true
        },
        modes: {
            repulse: { distance: 100, duration: 0.4 },
            push: { particles_nb: 4 }
        }
    },
    retina_detect: true
});

// ===== BLOG 数据 =====
const BLOG_POSTS = [
    {
        title: "如何判断一个产品是否值得加投广告",
        category: "Growth",
        date: "2026-03-01",
        desc: "基于Trend Factor与ROI结构，构建投放决策模型。",
        link: "#"
    },
    {
        title: "为什么大多数ROAS优化都是错的",
        category: "Data",
        date: "2026-02-20",
        desc: "ROAS不是目标，而是结果。",
        link: "#"
    },
    {
        title: "AI在电商中的3个真实应用场景",
        category: "AI",
        date: "2026-02-10",
        desc: "自动化在电商中的真实应用。",
        link: "#"
    }
];

// ===== 渲染 BLOG =====
function renderBlog() {
    const container = document.getElementById("blog-list");

    container.innerHTML = BLOG_POSTS.map(post => `
        <div class="card">
            <div style="font-size:12px;color:#888">${post.date}</div>
            <h3>${post.title}</h3>
            <p>${post.desc}</p>
            <div style="display:flex;justify-content:space-between;">
                <span class="tag">${post.category}</span>
                <a href="${post.link}" style="color:#00ff9d;">Read →</a>
            </div>
        </div>
    `).join('');
}

renderBlog();

// ===== 滚动触发元素滑入 =====
const observerOptions = {
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
};

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
        }
    });
}, observerOptions);

document.querySelectorAll('.slide-in').forEach(el => {
    observer.observe(el);
});

// Smooth scrolling for navigation links
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        if (targetId === '#' || !document.querySelector(targetId)) return;

        const targetElement = document.querySelector(targetId);
        window.scrollTo({
            top: targetElement.offsetTop - 80, // Adjust offset as needed
            behavior: 'smooth'
        });
    });
});

// ===== 监听系统主题变化 (可选，用于调试或执行其他逻辑) =====
// 这部分代码可以保留，用于在主题切换时执行其他操作
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (e.matches) {
        console.log('系统已切换到深色模式');
        // 在此处可以添加其他针对深色模式的逻辑
    } else {
        console.log('系统已切换到浅色模式');
         // 在此处可以添加其他针对浅色模式的逻辑
    }
});

</script>

</body>
</html>
